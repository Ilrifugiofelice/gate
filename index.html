<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il Rifugio Felice</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:linear-gradient(180deg,#f7f7f2,#e8efe4);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  width:90%;
  max-width:390px;
  background:white;
  padding:34px 26px;
  border-radius:28px;
  text-align:center;
  box-shadow:0 18px 45px rgba(0,0,0,.18);
}

.logo{
  font-size:58px;
  margin-bottom:10px;
  animation:float 2.5s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

h1{
  margin:0;
  font-size:28px;
}

p{
  color:#666;
  font-size:18px;
  margin:18px 0 30px;
}

button{
  width:100%;
  padding:22px;
  font-size:25px;
  font-weight:700;
  border:none;
  border-radius:18px;
  background:#2e7d32;
  color:white;
  cursor:pointer;
  transition:.25s;
  box-shadow:0 8px 18px rgba(46,125,50,.35);
}

button:active{
  transform:scale(.97);
}

button.loading{
  background:#f9a825;
}

button.success{
  background:#1565c0;
}

button:disabled{
  background:#999;
  box-shadow:none;
}

#status{
  margin-top:24px;
  font-size:18px;
  font-weight:600;
  min-height:26px;
  color:#2e7d32;
}
</style>
</head>

<body>

<div class="card">
  <img
src="logo.png"
alt="Il Rifugio Felice"
style="
width:100%;
max-width:320px;
margin-bottom:25px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
">

<p style="
font-size:18px;
color:#555;
margin-bottom:30px;
">
Welcome!<br>
Press the button below to open the gate.
</p>

  <button id="gateButton">🔓 OPEN GATE</button>

  <div id="status">Ready</div>
</div>

<script>
const firebaseUrl =
"https://il-rifugio-felice-default-rtdb.europe-west1.firebasedatabase.app/gate/request_id.json";

const button = document.getElementById("gateButton");
const status = document.getElementById("status");

button.onclick = async () => {
  button.disabled = true;
  button.classList.add("loading");
  button.innerHTML = "SENDING...";
  status.innerHTML = "Sending command...";

  if (navigator.vibrate) {
    navigator.vibrate(80);
  }

  try {
    const response = await fetch(firebaseUrl);
    const current = await response.json();

    await fetch(firebaseUrl, {
      method: "PUT",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(Number(current) + 1)
    });

    button.classList.remove("loading");
    button.classList.add("success");
    button.innerHTML="🔓 OPENING...";
    status.innerHTML = "Gate opening...";

    if (navigator.vibrate) {
      navigator.vibrate([80,80,120]);
    }

  } catch(e) {
    button.classList.remove("loading");
    button.innerHTML = "🔓 OPEN GATE";
    status.innerHTML = "Connection error";
    button.disabled = false;
    return;
  }

  let seconds = 10;

  const timer = setInterval(() => {
    seconds--;
    status.innerHTML = "Please wait " + seconds + " seconds";

    if (seconds <= 0) {
      clearInterval(timer);
      button.classList.remove("success");
      button.innerHTML = "🔓 OPEN GATE";
      status.innerHTML = "Ready";
      button.disabled = false;
    }
  }, 1000);
};

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
