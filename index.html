<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Il Rifugio Felice</title>

<style>

body{

    margin:0;
    font-family:Arial,Helvetica,sans-serif;

    background:#f4f4f4;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

}

.card{

    width:90%;
    max-width:400px;

    background:white;

    padding:30px;

    border-radius:20px;

    text-align:center;

    box-shadow:0px 10px 30px rgba(0,0,0,0.15);

}

h1{

    margin-bottom:10px;

}

p{

    color:#666;

    margin-bottom:30px;

}

button{

    width:100%;

    padding:20px;

    font-size:24px;

    border:none;

    border-radius:15px;

    background:#2e7d32;

    color:white;

    cursor:pointer;

    transition:0.3s;

}

button:disabled{

    background:#999;

    cursor:not-allowed;

}

#status{

    margin-top:20px;

    font-size:18px;

    color:#2e7d32;

    min-height:25px;

}

</style>

</head>

<body>

<div class="card">

<h1>🏡 Il Rifugio Felice</h1>

<p>Press the button below to open the gate.</p>

<button id="gateButton">

OPEN GATE

</button>

<div id="status"></div>

</div>

<script>

const firebaseUrl =
"https://il-rifugio-felice-default-rtdb.europe-west1.firebasedatabase.app/gate/request_id.json";

const button = document.getElementById("gateButton");
const status = document.getElementById("status");

button.onclick = async () => {

    button.disabled = true;

    status.innerHTML="Opening gate...";

    try{

        const response=await fetch(firebaseUrl);

        const current=await response.json();

        await fetch(firebaseUrl,{

            method:"PUT",

            headers:{

                "Content-Type":"application/json"

            },

            body:JSON.stringify(current+1)

        });

    }

    catch(e){

        status.innerHTML="Connection error";

        button.disabled=false;

        return;

    }

    let seconds=10;

    status.innerHTML="Gate opening... ("+seconds+")";

    const timer=setInterval(()=>{

        seconds--;

        if(seconds<=0){

            clearInterval(timer);

            status.innerHTML="Ready";

            button.disabled=false;

        }

        else{

            status.innerHTML="Gate opening... ("+seconds+")";

        }

    },1000);

};

</script>

</body>

</html>
